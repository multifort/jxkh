apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: enterprise-guardian
data:
  # Redis 配置
  REDIS_HOST: "redis-master.redis.svc.cluster.local"
  REDIS_PORT: "6379"

  # 消息队列配置
  MQ_HOST: "rabbitmq.rabbitmq.svc.cluster.local"
  MQ_PORT: "5672"
  MQ_USERNAME: "admin"
  MQ_PASSWORD: "admin123"

  # 日志配置
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "{timestamp} {level} {trace_id} {class} - {message}"

  # 监控配置
  METRICS_ENABLED: "true"
  METRICS_PATH: "/actuator/metrics"

  # 安全配置
  CORS_ALLOWED_ORIGINS: "http://app.example.com,http://localhost:3000"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_MAX_REQUESTS: "100"
  RATE_LIMIT_TIME_WINDOW: "60000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: enterprise-guardian
data:
  # API 配置
  VITE_API_BASE_URL: "http://backend-service:8080/api"
  VITE_API_VERSION: "v1"

  # 环境配置
  NODE_ENV: "production"

  # 分析配置
  ANALYTICS_ENABLED: "false"
