version: '3.8'

services:
  # 数据库
  mysql:
    image: mysql:8.0
    container_name: backend-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=guardian_db
      - MYSQL_USER=guardian
      - MYSQL_PASSWORD=guardian123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '3306:3306'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: backend-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: backend-mq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端应用
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: backend-app
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/guardian_db
      - SPRING_DATASOURCE_USERNAME=guardian
      - SPRING_DATASOURCE_PASSWORD=guardian123
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQ_HOST=rabbitmq
      - MQ_PORT=5672
      - MQ_USERNAME=admin
      - MQ_PASSWORD=admin123
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - '8080:8080'
    networks:
      - backend-network

  # 前端应用
  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    container_name: frontend-app
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
      - VITE_API_VERSION=v1
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
